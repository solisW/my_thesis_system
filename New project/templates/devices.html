{% extends "base.html" %}

{% block title %}设备管理 | 智能燃气监测系统{% endblock %}

{% block body %}
<main class="app-layout page-shell" data-page="devices" data-api-url="{{ url_for('api_devices') }}" data-ws-url="{{ ws_url }}">
    <aside class="sidebar">
        <div class="brand"><p class="eyebrow">Gas IoT</p><h2>监测平台</h2></div>
        <nav class="nav-menu">
            <a class="nav-item {% if active_page == 'dashboard' %}active{% endif %}" href="{{ url_for('dashboard') }}">实时仪表盘</a>
            <a class="nav-item {% if active_page == 'devices' %}active{% endif %}" href="{{ url_for('devices_page') }}">设备管理</a>
            <a class="nav-item {% if active_page == 'alerts' %}active{% endif %}" href="{{ url_for('alerts_page') }}">告警中心</a>
            <a class="nav-item {% if active_page == 'history' %}active{% endif %}" href="{{ url_for('history_page') }}">历史数据</a>
            <a class="nav-item {% if active_page == 'settings' %}active{% endif %}" href="{{ url_for('settings_page') }}">系统设置</a>
        </nav>
    </aside>
    <section class="main-panel">
        <header class="topbar">
            <div><p class="eyebrow">Device Center</p><h1>设备管理</h1></div>
            <div class="topbar-actions"><div class="welcome">当前用户：{{ user_name }}</div><a class="logout-link" href="{{ url_for('logout') }}">退出登录</a></div>
        </header>

        <section class="panel">
            <div class="panel-head"><h2>新增 / 编辑设备</h2><span class="panel-note">保存后立即同步到后端</span></div>
            <form id="deviceForm" class="device-form">
                <input type="hidden" id="deviceId">
                <input id="meterIdInput" type="text" placeholder="设备编号，如 GM005" required>
                <input id="deviceNameInput" type="text" placeholder="设备名称" required>
                <input id="deviceLocationInput" type="text" placeholder="安装位置" required>
                <input id="deviceApiKeyInput" type="text" placeholder="API Key，不填则自动生成">
                <button class="secondary-button" type="submit">保存设备</button>
                <button class="ghost-button" id="deviceFormReset" type="button">清空表单</button>
            </form>
        </section>

        <section class="panel">
            <div class="panel-head"><h2>接入设备列表</h2><span class="panel-note">支持编辑和删除</span></div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>设备编号</th>
                            <th>设备名称</th>
                            <th>位置</th>
                            <th>状态</th>
                            <th>异常次数</th>
                            <th>API Key</th>
                            <th>最后上报</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="devicesTableBody"></tbody>
                </table>
            </div>
        </section>
    </section>
</main>
<script src="{{ url_for('static', filename='app.js') }}"></script>
{% endblock %}
