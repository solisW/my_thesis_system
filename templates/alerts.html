{% extends "base.html" %}

{% block title %}告警中心 | 智能燃气调度平台{% endblock %}

{% block body %}
<main class="admin-shell" data-page="alerts" data-ws-url="{{ ws_url }}">
    {% include "partials/sidebar.html" %}
    <section class="content-shell">
        <header class="topbar">
            <div>
                <p class="eyebrow">Alert Center</p>
                <h1>异常告警中心</h1>
                <p class="subtle">支持按时间或紧急程度查看最新告警。</p>
            </div>
            <div class="topbar-right">
                <span class="user-badge">{{ user_name }}</span>
                <a class="logout-link" href="{{ url_for('logout') }}">退出登录</a>
            </div>
        </header>

        <section class="panel">
            <div class="panel-head">
                <div>
                    <h2>告警列表</h2>
                    <p class="panel-note">先按紧急程度看重点，再切回时间顺序查看最新变化。</p>
                </div>
                <select id="alertSortSelect">
                    <option value="time">按时间</option>
                    <option value="severity">按紧急程度</option>
                </select>
            </div>
            <div id="alertCards" class="alert-grid"></div>
        </section>
    </section>
</main>
<script src="{{ url_for('static', filename='app.js') }}"></script>
{% endblock %}
