{% extends "base.html" %}

{% block title %}工程师管理 | 智能燃气调度平台{% endblock %}

{% block body %}
<main class="admin-shell" data-page="engineers" data-ws-url="{{ ws_url }}">
    {% include "partials/sidebar.html" %}
    <section class="content-shell">
        <header class="topbar">
            <div>
                <p class="eyebrow">Engineer Center</p>
                <h1>工程师管理</h1>
                <p class="subtle">统一维护工程师信息、状态与负责片区。</p>
            </div>
            <div class="topbar-right">
                <span class="user-badge">{{ user_name }}</span>
                <a class="logout-link" href="{{ url_for('logout') }}">退出登录</a>
            </div>
        </header>

        <section class="panel">
            <div class="panel-head">
                <div>
                    <h2>工程师信息</h2>
                    <p class="panel-note">按任务忙闲状态分派工单更直观。</p>
                </div>
            </div>
            <form id="engineerForm" class="form-grid compact">
                <input type="hidden" id="engineerId">
                <input id="engineerName" type="text" placeholder="姓名">
                <input id="engineerPhone" type="text" placeholder="联系电话">
                <input id="engineerSpecialty" type="text" placeholder="专长">
                <input id="engineerRegion" type="text" placeholder="负责片区">
                <select id="engineerStatus">
                    <option value="available">空闲</option>
                    <option value="busy">忙碌</option>
                    <option value="offline">离岗</option>
                </select>
                <div class="form-actions">
                    <button class="primary-button" type="submit">保存工程师</button>
                    <button id="engineerReset" class="ghost-button" type="button">清空</button>
                </div>
            </form>
        </section>

        <section class="panel">
            <div class="panel-head">
                <div>
                    <h2>工程师列表</h2>
                    <p class="panel-note">展示当前状态和正在处理的工单数。</p>
                </div>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>姓名</th>
                            <th>电话</th>
                            <th>专长</th>
                            <th>状态</th>
                            <th>片区</th>
                            <th>处理中工单</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="engineerTable"></tbody>
                </table>
            </div>
        </section>
    </section>
</main>
<script src="{{ url_for('static', filename='app.js') }}"></script>
{% endblock %}
