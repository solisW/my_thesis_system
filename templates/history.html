{% extends "base.html" %}

{% block title %}历史数据 | 智能燃气调度平台{% endblock %}

{% block body %}
<main class="admin-shell" data-page="history" data-ws-url="{{ ws_url }}">
    {% include "partials/sidebar.html" %}
    <section class="content-shell">
        <header class="topbar">
            <div>
                <p class="eyebrow">History</p>
                <h1>历史数据查询</h1>
                <p class="subtle">按设备筛选历史上报记录，查看趋势和异常判定。</p>
            </div>
            <div class="topbar-right">
                <span class="user-badge">{{ user_name }}</span>
                <a class="logout-link" href="{{ url_for('logout') }}">退出登录</a>
            </div>
        </header>

        <section class="panel">
            <div class="panel-head">
                <div>
                    <h2>历史记录筛选</h2>
                    <p class="panel-note">先选择设备，再刷新查看历史列表。</p>
                </div>
            </div>
            <div class="toolbar">
                <select id="historyMeterSelect">
                    <option value="">全部设备</option>
                    {% for meter_id in meter_ids %}
                    <option value="{{ meter_id }}">{{ meter_id }}</option>
                    {% endfor %}
                </select>
                <button id="historyRefresh" class="primary-button" type="button">刷新历史</button>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>设备</th>
                            <th>瞬时流量</th>
                            <th>累计用气量</th>
                            <th>信号</th>
                            <th>电压</th>
                            <th>判定</th>
                        </tr>
                    </thead>
                    <tbody id="historyTable"></tbody>
                </table>
            </div>
        </section>
    </section>
</main>
<script src="{{ url_for('static', filename='app.js') }}"></script>
{% endblock %}
